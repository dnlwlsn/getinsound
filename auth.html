<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In | Insound</title>
    <meta name="description" content="Sign in or create your free Insound account. Join 12,400+ independent artists earning 90% from every sale.">
    <meta property="og:title" content="Sign In | Insound">
    <meta property="og:description" content="Sign in or create your free Insound account. Join 12,400+ independent artists earning 90% from every sale.">
    <meta property="og:type" content="website">
    <link rel="icon" href="favicon.svg" type="image/svg+xml">
    <link rel="stylesheet" href="tailwind.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,400;0,500;0,600;0,700;0,800;0,900;1,700&display=swap" rel="stylesheet">
    <style>
        body { background-color: #09090b; color: #f4f4f5; font-family: 'Inter', sans-serif; }
        .glass { background: rgba(9,9,11,0.88); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); }
        .emerald-glow { box-shadow: 0 0 60px rgba(234, 88, 12, 0.08); }
        input:focus { border-color: #ea580c !important; }
        .tab-active { border-color: #ea580c !important; color: #f4f4f5 !important; }
        .grid-bg {
            background-image:
                linear-gradient(rgba(255,255,255,0.024) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.024) 1px, transparent 1px);
            background-size: 48px 48px;
        }
        @keyframes slide-in-up {
            from { opacity: 0; transform: translateY(20px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        .slide-in-up { animation: slide-in-up 0.5s ease both; }
    </style>
</head>
<body class="min-h-screen flex flex-col relative grid-bg">
<nav class="sticky top-0 w-full z-50 flex justify-between items-center px-6 md:px-14 py-5 glass border-b border-zinc-900/80">
    <a href="index.html" class="text-2xl font-black text-orange-600 tracking-tighter hover:text-orange-500 transition-colors">insound.</a>
    <div class="hidden md:flex gap-10 text-[10px] font-black uppercase tracking-[0.2em] text-zinc-400">
        <a href="explore.html" class="hover:text-orange-500 transition-colors">Explore</a>
        <a href="why-us.html" class="hover:text-orange-500 transition-colors">Why Insound</a>
        <a href="index.html#how-it-works" class="hover:text-orange-500 transition-colors">How It Works</a>
    </div>
    <div class="flex gap-3 items-center">
        <a href="auth.html" class="text-[10px] font-black uppercase tracking-widest text-zinc-400 hover:text-white transition-colors hidden sm:block">Sign In</a>
        <a href="auth.html" class="bg-orange-600 text-black px-5 py-2.5 rounded-full text-[10px] font-black uppercase tracking-widest hover:bg-orange-500 transition-colors shadow-lg shadow-orange-600/20">Get Started</a>
    </div>
</nav>
<div class="flex-1 flex items-center justify-center p-6">

    <div class="absolute inset-0 bg-[radial-gradient(ellipse_at_top,rgba(234,88,12,0.05),transparent_60%)]"></div>
    <div class="absolute inset-0 bg-[radial-gradient(ellipse_at_bottom_left,rgba(234,88,12,0.04),transparent_55%)] pointer-events-none"></div>

    <!-- Back link -->
    <a href="index.html" class="absolute top-6 left-6 text-zinc-600 hover:text-white transition-colors flex items-center gap-1.5 text-xs font-bold">
        <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7"/></svg>
        Home
    </a>

    <div class="w-full max-w-md relative z-10 slide-in-up">
        <div class="text-center mb-8">
            <a href="index.html" class="text-3xl font-black text-orange-600 tracking-tighter hover:text-orange-500 transition-colors">insound.</a>
            <p class="text-zinc-500 mt-2 font-medium text-sm">Independent music, directly supported.</p>
        </div>

        <!-- Social proof strip -->
        <div class="flex items-center justify-center gap-3 mb-8 flex-wrap">
            <span class="bg-zinc-900 border border-zinc-800 rounded-full px-4 py-2 text-[10px] font-black uppercase tracking-widest text-zinc-500">12,400+ Artists</span>
            <span class="bg-zinc-900 border border-zinc-800 rounded-full px-4 py-2 text-[10px] font-black uppercase tracking-widest text-orange-500">£890K+ Paid Out</span>
            <span class="bg-zinc-900 border border-zinc-800 rounded-full px-4 py-2 text-[10px] font-black uppercase tracking-widest text-zinc-500">Free Forever</span>
        </div>

        <div class="bg-zinc-900 border border-zinc-800 p-8 rounded-3xl shadow-2xl emerald-glow" style="animation-delay:0.1s">

            <!-- Tabs -->
            <div class="flex gap-1 mb-8 bg-zinc-950 p-1 rounded-xl">
                <button id="loginTab" onclick="switchTab('login')" class="flex-1 py-3 rounded-lg font-bold text-sm bg-zinc-800 text-white transition-all">Sign In</button>
                <button id="signupTab" onclick="switchTab('signup')" class="flex-1 py-3 rounded-lg font-bold text-sm text-zinc-500 hover:text-zinc-300 transition-all">Create Account</button>
            </div>

            <!-- Login Form -->
            <form id="loginForm" onsubmit="handleLogin(event)" class="space-y-5">
                <div>
                    <label class="text-[10px] font-black uppercase tracking-widest text-zinc-500 block mb-2">Email Address</label>
                    <input type="email" placeholder="name@example.com" required class="w-full bg-zinc-950 border border-zinc-800 rounded-xl py-3.5 px-4 outline-none transition-colors text-white text-sm placeholder-zinc-700">
                </div>
                <div class="relative">
                    <label class="text-[10px] font-black uppercase tracking-widest text-zinc-500 block mb-2">Password</label>
                    <input type="password" id="loginPassword" placeholder="••••••••" required class="w-full bg-zinc-950 border border-zinc-800 rounded-xl py-3.5 px-4 outline-none transition-colors text-white text-sm pr-12">
                    <button type="button" onclick="togglePassword('loginPassword')" class="absolute right-4 top-[38px] text-zinc-600 hover:text-zinc-400 transition-colors">
                        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/><path d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/></svg>
                    </button>
                </div>
                <div class="text-right">
                    <a href="#" class="text-xs text-zinc-500 hover:text-orange-500 transition-colors font-bold">Forgot password?</a>
                </div>
                <button id="loginBtn" type="submit" class="w-full bg-orange-600 text-black font-black py-4 rounded-xl hover:bg-orange-500 transition-colors text-sm uppercase tracking-wider flex items-center justify-center gap-2">
                    <span id="loginBtnText">Sign In</span>
                    <svg id="loginSpinner" class="hidden animate-spin" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83"/></svg>
                </button>
            </form>

            <!-- Sign Up Form -->
            <form id="signupForm" onsubmit="handleSignup(event)" class="space-y-5 hidden">
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="text-[10px] font-black uppercase tracking-widest text-zinc-500 block mb-2">First Name</label>
                        <input type="text" placeholder="Dan" required class="w-full bg-zinc-950 border border-zinc-800 rounded-xl py-3.5 px-4 outline-none transition-colors text-white text-sm placeholder-zinc-700">
                    </div>
                    <div>
                        <label class="text-[10px] font-black uppercase tracking-widest text-zinc-500 block mb-2">Last Name</label>
                        <input type="text" placeholder="Smith" required class="w-full bg-zinc-950 border border-zinc-800 rounded-xl py-3.5 px-4 outline-none transition-colors text-white text-sm placeholder-zinc-700">
                    </div>
                </div>
                <div>
                    <label class="text-[10px] font-black uppercase tracking-widest text-zinc-500 block mb-2">Email Address</label>
                    <input type="email" placeholder="name@example.com" required class="w-full bg-zinc-950 border border-zinc-800 rounded-xl py-3.5 px-4 outline-none transition-colors text-white text-sm placeholder-zinc-700">
                </div>
                <div class="relative">
                    <label class="text-[10px] font-black uppercase tracking-widest text-zinc-500 block mb-2">Password</label>
                    <input type="password" id="signupPassword" placeholder="At least 8 characters" required class="w-full bg-zinc-950 border border-zinc-800 rounded-xl py-3.5 px-4 outline-none transition-colors text-white text-sm placeholder-zinc-700 pr-12">
                    <button type="button" onclick="togglePassword('signupPassword')" class="absolute right-4 top-[38px] text-zinc-600 hover:text-zinc-400 transition-colors">
                        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/><path d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/></svg>
                    </button>
                </div>
                <div>
                    <label class="text-[10px] font-black uppercase tracking-widest text-zinc-500 block mb-3">I am joining as...</label>
                    <div class="grid grid-cols-2 gap-3">
                        <label class="cursor-pointer">
                            <input type="radio" name="role" value="artist" class="sr-only peer" checked>
                            <div class="border border-zinc-800 rounded-xl p-4 text-center peer-checked:border-orange-600 peer-checked:bg-orange-600/10 transition-all hover:border-zinc-700">
                                <div class="text-lg mb-1">🎵</div>
                                <p class="font-bold text-sm">Artist</p>
                                <p class="text-zinc-500 text-[10px]">I sell music</p>
                            </div>
                        </label>
                        <label class="cursor-pointer">
                            <input type="radio" name="role" value="listener" class="sr-only peer">
                            <div class="border border-zinc-800 rounded-xl p-4 text-center peer-checked:border-orange-600 peer-checked:bg-orange-600/10 transition-all hover:border-zinc-700">
                                <div class="text-lg mb-1">🎧</div>
                                <p class="font-bold text-sm">Listener</p>
                                <p class="text-zinc-500 text-[10px]">I buy music</p>
                            </div>
                        </label>
                    </div>
                </div>
                <button id="signupBtn" type="submit" class="w-full bg-orange-600 text-black font-black py-4 rounded-xl hover:bg-orange-500 transition-colors text-sm uppercase tracking-wider flex items-center justify-center gap-2">
                    <span id="signupBtnText">Create Account</span>
                    <svg id="signupSpinner" class="hidden animate-spin" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83"/></svg>
                </button>
                <p class="text-center text-[10px] text-zinc-600 leading-relaxed">
                    By creating an account you agree to our <a href="privacy.html" class="text-zinc-500 hover:text-white transition-colors">Privacy Policy</a>.
                </p>
            </form>

            <!-- Social Sign In -->
            <div class="mt-7 pt-7 border-t border-zinc-800">
                <p class="text-[10px] text-zinc-500 font-black uppercase tracking-widest text-center mb-4">Or continue with</p>
                <div class="grid grid-cols-2 gap-3">
                    <button onclick="socialLogin()" class="bg-zinc-800 hover:bg-zinc-700 py-3.5 rounded-xl font-bold text-xs transition-colors flex items-center justify-center gap-2">
                        <svg width="14" height="14" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
                        Google
                    </button>
                    <button onclick="socialLogin()" class="bg-zinc-800 hover:bg-zinc-700 py-3.5 rounded-xl font-bold text-xs transition-colors flex items-center justify-center gap-2">
                        <svg width="14" height="14" fill="currentColor" viewBox="0 0 24 24"><path d="M18.71 19.5c-.83 1.24-1.71 2.45-3.05 2.47-1.34.03-1.77-.79-3.29-.79-1.53 0-2 .77-3.27.82-1.31.05-2.3-1.32-3.14-2.53C4.25 17 2.94 12.45 4.7 9.39c.87-1.52 2.43-2.48 4.12-2.51 1.28-.02 2.5.87 3.29.87.78 0 2.26-1.07 3.8-.91.65.03 2.47.26 3.64 1.98-.09.06-2.17 1.28-2.15 3.81.03 3.02 2.65 4.03 2.68 4.04-.03.07-.42 1.44-1.38 2.83M13 3.5c.73-.83 1.94-1.46 2.94-1.5.13 1.17-.34 2.35-1.04 3.19-.69.85-1.83 1.51-2.95 1.42-.15-1.15.41-2.35 1.05-3.11z"/></svg>
                        Apple
                    </button>
                </div>
            </div>

            <!-- Trust footer -->
            <div class="mt-6 pt-5 border-t border-zinc-800 flex justify-center gap-6">
                <span class="flex items-center gap-1.5 text-[10px] text-zinc-600 font-bold">
                    <svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>
                    Secure
                </span>
                <span class="flex items-center gap-1.5 text-[10px] text-zinc-600 font-bold">
                    <svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
                    Private
                </span>
                <span class="flex items-center gap-1.5 text-[10px] text-zinc-600 font-bold">
                    <svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
                    Free
                </span>
            </div>
        </div>
    </div>

    <script>
        function switchTab(tab) {
            const loginForm = document.getElementById('loginForm');
            const signupForm = document.getElementById('signupForm');
            const loginTab = document.getElementById('loginTab');
            const signupTab = document.getElementById('signupTab');

            if (tab === 'login') {
                loginForm.classList.remove('hidden');
                signupForm.classList.add('hidden');
                loginTab.classList.add('bg-zinc-800', 'text-white');
                loginTab.classList.remove('text-zinc-500');
                signupTab.classList.remove('bg-zinc-800', 'text-white');
                signupTab.classList.add('text-zinc-500');
            } else {
                signupForm.classList.remove('hidden');
                loginForm.classList.add('hidden');
                signupTab.classList.add('bg-zinc-800', 'text-white');
                signupTab.classList.remove('text-zinc-500');
                loginTab.classList.remove('bg-zinc-800', 'text-white');
                loginTab.classList.add('text-zinc-500');
            }
        }

        function handleLogin(e) {
            e.preventDefault();
            const btn = document.getElementById('loginBtn');
            const txt = document.getElementById('loginBtnText');
            const spinner = document.getElementById('loginSpinner');
            btn.disabled = true;
            txt.textContent = 'Signing in...';
            spinner.classList.remove('hidden');
            btn.classList.add('opacity-80');
            localStorage.setItem('insound_user', 'YOUTH');
            localStorage.setItem('insound_logged_in', 'true');
            setTimeout(() => { window.location.href = 'dashboard.html'; }, 1400);
        }

        function handleSignup(e) {
            e.preventDefault();
            const btn = document.getElementById('signupBtn');
            const txt = document.getElementById('signupBtnText');
            const spinner = document.getElementById('signupSpinner');
            btn.disabled = true;
            txt.textContent = 'Creating account...';
            spinner.classList.remove('hidden');
            btn.classList.add('opacity-80');
            localStorage.setItem('insound_user', 'YOUTH');
            localStorage.setItem('insound_logged_in', 'true');
            setTimeout(() => { window.location.href = 'dashboard.html'; }, 1800);
        }

        function socialLogin() {
            localStorage.setItem('insound_user', 'YOUTH');
            localStorage.setItem('insound_logged_in', 'true');
            setTimeout(() => { window.location.href = 'dashboard.html'; }, 600);
        }

        function togglePassword(id) {
            const input = document.getElementById(id);
            input.type = input.type === 'password' ? 'text' : 'password';
        }
    </script>
</div>
</body>
</html>
