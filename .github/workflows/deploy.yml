name: Deploy to Cloudflare Workers

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      NEXT_PUBLIC_SUPABASE_URL: https://rvsfriqjobwuzzfdiyxg.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: sb_publishable_m2T7SpX_nYsK9i9CC3aDDw_SFeOtEUg
      NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: pk_test_51TM4GsGkY3otnyNsltYWVo9N1xWEzKEUa8B4XjPlmSnP5VLCKAnkTebfHM8QOkmLTxyxxhNKQ4iJ9karlBfo5jEv007Ts2uEgI
      NEXT_PUBLIC_VAPID_PUBLIC_KEY: BAuPXjrPiFVGjRNsC1Le0C40FkcuyK2VtKqFXpP_iTPk-6JdQvoUB2OZK8k5tbay-ljtTkcOCg42xpTaLOT0Dsw
      NEXT_PUBLIC_SITE_URL: https://getinsound.com
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - run: npm run pages:build

      - run: npx wrangler deploy .open-next/worker.js --experimental-autoconfig=false
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
