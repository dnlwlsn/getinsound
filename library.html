<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Collection | Insound</title>
    <meta name="description" content="Your Insound music collection. Every purchase pays the artist directly — browse, play, and revisit your library.">
    <meta property="og:title" content="My Collection | Insound">
    <meta property="og:description" content="Your Insound music collection. Every purchase pays the artist directly — browse, play, and revisit your library.">
    <meta property="og:type" content="website">
    <link rel="icon" href="favicon.svg" type="image/svg+xml">
    <link rel="stylesheet" href="tailwind.css">
    <link rel="dns-prefetch" href="//picsum.photos">
    <link rel="dns-prefetch" href="//api.dicebear.com">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,400;0,500;0,600;0,700;0,800;0,900;1,700&display=swap" rel="stylesheet">
    <style>
        body { background-color: #09090b; color: #f4f4f5; font-family: 'Inter', sans-serif; }
        @keyframes pulse-dot { 0%,100%{opacity:1}50%{opacity:.35} }
        .pulse-dot { animation: pulse-dot 2s ease-in-out infinite; }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="min-h-screen">

    <!-- NAV -->
    <nav class="flex justify-between items-center px-8 py-5 border-b border-zinc-900 bg-black/80 backdrop-blur-md sticky top-0 z-50">
        <a href="index.html" class="text-xl font-black text-orange-600 tracking-tighter hover:text-orange-500 transition-colors">insound.</a>
        <div class="flex gap-4 items-center">
            <a href="explore.html" class="text-xs font-black text-zinc-400 hover:text-white uppercase tracking-widest transition-colors">Back to Store</a>
            <a href="dashboard.html" class="bg-zinc-800 h-9 w-9 rounded-full border border-zinc-700 overflow-hidden hover:border-orange-600 transition-colors block">
                <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Dan" class="w-full h-full" loading="lazy">
            </a>
        </div>
    </nav>

    <div class="max-w-6xl mx-auto px-8 py-12">

        <!-- Header -->
        <div class="flex flex-col md:flex-row justify-between items-start md:items-end gap-6 mb-6">
            <div>
                <p class="text-orange-600 text-[10px] font-black uppercase tracking-[0.3em] mb-3">Your Collection</p>
                <h1 class="text-5xl font-black tracking-tighter mb-2">My Music</h1>
                <p class="text-zinc-400 font-medium">You have supported <span class="text-white font-bold">0 artists</span> directly.</p>
            </div>
            <div class="flex gap-3">
                <div class="bg-zinc-900 border border-zinc-800 px-6 py-4 rounded-2xl text-right">
                    <p class="text-[10px] font-black text-zinc-500 uppercase tracking-widest mb-1">Total Contributed</p>
                    <p class="text-2xl font-black text-orange-600">£0.00</p>
                </div>
                <div class="bg-zinc-900 border border-zinc-800 px-6 py-4 rounded-2xl text-right">
                    <p class="text-[10px] font-black text-zinc-500 uppercase tracking-widest mb-1">Tracks Owned</p>
                    <p class="text-2xl font-black">0</p>
                </div>
            </div>
        </div>

        <!-- Filter/sort bar -->
        <div class="flex items-center justify-between mb-6 gap-3 flex-wrap">
            <div class="flex gap-2 flex-wrap" id="filterBtns">
                <button onclick="filterBy('all')" class="filter-btn text-[10px] font-black uppercase tracking-widest px-4 py-2 rounded-full border border-orange-600 bg-orange-600/10 text-orange-500 transition-all">All</button>
                <button onclick="filterBy('Indie')" class="filter-btn text-[10px] font-black uppercase tracking-widest px-4 py-2 rounded-full border border-zinc-800 text-zinc-500 hover:border-zinc-700 hover:text-white transition-all">Indie</button>
                <button onclick="filterBy('Electronic')" class="filter-btn text-[10px] font-black uppercase tracking-widest px-4 py-2 rounded-full border border-zinc-800 text-zinc-500 hover:border-zinc-700 hover:text-white transition-all">Electronic</button>
                <button onclick="filterBy('Lo-Fi')" class="filter-btn text-[10px] font-black uppercase tracking-widest px-4 py-2 rounded-full border border-zinc-800 text-zinc-500 hover:border-zinc-700 hover:text-white transition-all">Lo-Fi</button>
            </div>
            <select onchange="sortBy(this.value)" class="bg-zinc-900 border border-zinc-800 rounded-xl py-2 px-4 outline-none text-zinc-400 text-xs font-bold focus:border-orange-600 transition-colors">
                <option value="default">Recently Added</option>
                <option value="artist">By Artist</option>
                <option value="price">By Price</option>
            </select>
        </div>

        <!-- Collection Grid -->
        <div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-8" id="collectionGrid"></div>

    </div>

    <!-- Toast -->
    <div id="toast" class="fixed bottom-6 left-1/2 -translate-x-1/2 bg-zinc-800 border border-zinc-700 text-white px-5 py-3 rounded-full text-sm font-bold shadow-xl z-[300] transition-all duration-300 opacity-0 translate-y-4"></div>

    <script>
        const collection = [];

        const grid = document.getElementById('collectionGrid');
        let currentFilter = 'all';

        function renderCollection(sort = 'default') {
            let filtered = currentFilter === 'all' ? [...collection] : collection.filter(t => t.genre === currentFilter);
            if (sort === 'artist') filtered.sort((a, b) => a.artist.localeCompare(b.artist));
            if (sort === 'price') filtered.sort((a, b) => parseFloat(b.price) - parseFloat(a.price));
            if (filtered.length === 0) {
                grid.innerHTML = '<div class="col-span-full py-20 text-center text-zinc-600"><p class="font-bold text-sm mb-2">Your collection is empty.</p><p class="text-xs"><a href="explore.html" class="text-orange-600 hover:text-orange-500 font-black">Explore music \u2192</a></p></div>';
                return;
            }
            grid.innerHTML = filtered.map(t => `
                <div class="group">
                    <div class="aspect-square rounded-2xl overflow-hidden mb-4 border border-zinc-800 group-hover:scale-[1.02] transition-all duration-400 relative shadow-xl">
                        <img src="${t.img}" class="w-full h-full object-cover" loading="lazy" alt="${t.title}">
                        <div class="absolute inset-0 bg-black/60 opacity-0 group-hover:opacity-100 transition-opacity flex flex-col items-center justify-center gap-3 p-4">
                            <a href="player.html?id=${t.id}&title=${encodeURIComponent(t.title)}&artist=${encodeURIComponent(t.artist)}&price=${t.price}&img=${encodeURIComponent(t.img)}" class="bg-orange-600 text-black font-black px-5 py-2.5 rounded-full text-[10px] uppercase tracking-wider hover:bg-orange-500 transition-colors w-full text-center">▶ Play</a>
                            <button onclick="downloadTrack(event, '${t.title}')" class="bg-white/10 border border-white/20 text-white font-black px-5 py-2.5 rounded-full text-[10px] uppercase tracking-wider hover:bg-white/20 transition-colors w-full">↓ Download WAV</button>
                        </div>
                    </div>
                    <h3 class="font-bold text-sm truncate">${t.title}</h3>
                    <p class="text-[10px] text-zinc-500 font-black uppercase tracking-widest mt-0.5 truncate">${t.artist}</p>
                    <div class="flex items-center justify-between mt-1.5">
                        <span class="text-[10px] text-zinc-600 font-bold">${t.genre}</span>
                        <span class="text-[10px] font-black text-orange-600">£${t.price} paid</span>
                    </div>
                </div>
            `).join('');
        }

        function filterBy(genre) {
            currentFilter = genre;
            document.querySelectorAll('.filter-btn').forEach(b => {
                const label = b.textContent.trim();
                const isActive = (genre === 'all' && label === 'All') || label === genre;
                b.className = `filter-btn text-[10px] font-black uppercase tracking-widest px-4 py-2 rounded-full border transition-all ${isActive ? 'border-orange-600 bg-orange-600/10 text-orange-500' : 'border-zinc-800 text-zinc-500 hover:border-zinc-700 hover:text-white'}`;
            });
            renderCollection();
        }

        function sortBy(val) { renderCollection(val); }

        renderCollection();

        let toastTimer;
        function downloadTrack(e, title) {
            e.preventDefault();
            const t = document.getElementById('toast');
            t.textContent = `↓ Downloading ${title}.wav...`;
            t.classList.remove('opacity-0', 'translate-y-4');
            t.classList.add('opacity-100', 'translate-y-0');
            clearTimeout(toastTimer);
            toastTimer = setTimeout(() => {
                t.classList.add('opacity-0', 'translate-y-4');
                t.classList.remove('opacity-100', 'translate-y-0');
            }, 2500);
        }
    </script>
</body>
</html>
